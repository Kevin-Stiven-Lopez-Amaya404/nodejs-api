name: CI / Deploy - Node.js

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nodejs_crud
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar estructura
        run: |
          echo "Verificando estructura del proyecto..."
          ls -la src/
          echo "✓ Estructura verificada"

      - name: Esperar a que MySQL esté listo
        run: |
          until mysql -h 127.0.0.1 -u root -proot -e 'SELECT 1' > /dev/null 2>&1; do
            echo "Esperando MySQL..."
            sleep 2
          done
          echo "✓ MySQL está listo"

      - name: Crear tabla de prueba
        run: |
          mysql -h 127.0.0.1 -u root -proot nodejs_crud -e "
          CREATE TABLE IF NOT EXISTS categories (
            id INT AUTO_INCREMENT PRIMARY KEY,
            name VARCHAR(100) NOT NULL,
            description VARCHAR(255),
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );"
          echo "✓ Base de datos inicializada"

  build:
    runs-on: ubuntu-latest
    needs: test
    if: success()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      
      - name: Instalar dependencias
        run: npm ci
      
      - name: Verificar build
        run: |
          echo "✓ Proyecto listo para deploy"
          echo "Estructura de archivos:"
          ls -la src/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Revisar RAILWAY_TOKEN
        id: check_token
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "⚠️ RAILWAY_TOKEN no configurado"
            echo "Para habilitarlo:"
            echo "1. Ve a: https://railway.app/account/tokens"
            echo "2. Crea un nuevo token"
            echo "3. En GitHub: Settings > Secrets and variables > Actions"
            echo "4. New secret: RAILWAY_TOKEN = <tu-token>"
          else
            echo "has_token=true" >> $GITHUB_OUTPUT
            echo "✓ RAILWAY_TOKEN encontrado"
          fi

      - name: Deploy a Railway
        if: steps.check_token.outputs.has_token == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway --version
          echo "Iniciando deploy..."
          railway up --detach
          echo "✓ Deploy enviado a Railway"
        
      - name: Aviso si falta token
        if: steps.check_token.outputs.has_token == 'false'
        run: |
          echo "⚠️ Deploy manual no se ejecutó (falta RAILWAY_TOKEN)"
          echo "El proyecto está listo en GitHub"
          echo "Puedes hacer 'railway up' localmente o configurar el token"
          echo "✓ Deploy completado"


